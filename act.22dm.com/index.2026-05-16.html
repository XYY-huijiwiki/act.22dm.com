        <style>
            /* 只在移动设备上限制横屏 - 使用触摸设备检测 */
            @media screen and (orientation: landscape) and (hover: none) and (pointer: coarse) {
                body {
                    overflow: hidden;
                }
                #app {
                    display: none !important;
                }
                .landscape-tip {

                }
            }
            /* 竖屏时显示页面（移动设备） */
            @media screen and (orientation: portrait) and (hover: none) and (pointer: coarse) {
                #app {
                    display: block !important;
                }
                .landscape-tip {
                    display: none !important;
                }
            }
            /* PC端始终显示页面 */
            @media (hover: hover) and (pointer: fine) {

                    display: block !important;
                }
                .landscape-tip {
                    display: none !important;
                }
            }
            /* 横屏提示层 */
            .landscape-tip {
                position: fixed;
                top: 0;

        <script>
            // 检测是否为移动设备
            function isMobileDevice() {
                // 检测触摸支持
                var hasTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0
                // 检测屏幕宽度（移动设备通常小于768px）
                var isSmallScreen = window.innerWidth <= 768
                // 检测 user agent
                var userAgent = navigator.userAgent || navigator.vendor || window.opera
                var isMobileUA = /android|webos|iphone|ipad|ipod|blackberry|iemobile|opera mini/i.test(
                    userAgent.toLowerCase(),
                )

                return hasTouch && (isSmallScreen || isMobileUA)
            }

            // 检测屏幕方向并显示提示（仅在移动设备上）
            function checkOrientation() {
                // 只在移动设备上执行检测
                if (!isMobileDevice()) {
                    var tipElement = document.getElementById('landscape-tip')
                    if (tipElement) {
                        tipElement.style.display = 'none'
                    }
                    return
                }

                var isLandscape = window.innerWidth > window.innerHeight
                var tipElement = document.getElementById('landscape-tip')

                if (isLandscape) {
                    // 横屏时显示提示
                    if (tipElement) {
                        tipElement.style.display = 'flex'
                    }
                } else {
                    // 竖屏时隐藏提示
                    if (tipElement) {
                        tipElement.style.display = 'none'
                    }
                }
            }

            // 页面加载完成后检测
            window.addEventListener('load', function () {
                checkOrientation()
            })

            // 监听屏幕方向变化（仅在移动设备上）
            window.addEventListener('orientationchange', function () {
                setTimeout(function () {
                    checkOrientation()
                }, 100)
            })

            // 监听窗口大小变化（兼容某些浏览器）
            window.addEventListener('resize', function () {
                setTimeout(function () {
                    checkOrientation()
                }, 100)
            })

            // 使用新的 Screen Orientation API
            if (screen.orientation) {
                screen.orientation.addEventListener('change', function () {
                    setTimeout(function () {
                        checkOrientation()
                    }, 100)
                })
            }
        </script>
